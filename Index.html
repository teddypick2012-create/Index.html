<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Volleyball Game Awareness Trainer</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f6f9;
        text-align: center;
        padding: 40px;
    }

    .container {
        background: white;
        max-width: 600px;
        margin: auto;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h1 {
        color: #1e3a8a;
    }

    .situation {
        font-size: 18px;
        margin: 20px 0;
    }

    .btn {
        display: block;
        width: 100%;
        margin: 10px 0;
        padding: 10px;
        font-size: 16px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        background: #2563eb;
        color: white;
        transition: 0.3s;
    }

    .btn:hover {
        background: #1e40af;
    }

    .correct {
        background: #16a34a !important;
    }

    .wrong {
        background: #dc2626 !important;
    }

    .feedback {
        margin-top: 15px;
        font-weight: bold;
    }

    #nextBtn {
        margin-top: 20px;
        background: #111827;
        display: none;
    }

</style>
</head>
<body>

<div class="container">
    <h1>🏐 Volleyball IQ Trainer</h1>
    <div id="progress"></div>
    <div class="situation" id="situation"></div>
    <div id="answers"></div>
    <div class="feedback" id="feedback"></div>
    <button id="nextBtn" class="btn">Next Situation</button>
</div>

<script>
const situations = [
    {
        question: "You are a setter in rotation 1. The pass is tight to the net and drifting over. What should you do?",
        answers: [
            { text: "Force a quick set to the middle", correct: false },
            { text: "Dump the ball if the setter is front row", correct: true },
            { text: "Back set blindly", correct: false },
            { text: "Let it cross the net untouched", correct: false }
        ]
    },
    {
        question: "You are an outside hitter and see a single blocker cross-court. Where should you attack?",
        answers: [
            { text: "Hit hard cross-court", correct: false },
            { text: "Tool the blocker’s outside hand", correct: true },
            { text: "Roll shot middle", correct: false },
            { text: "Tip straight up", correct: false }
        ]
    },
    {
        question: "You are middle blocker. Opposing setter is back row. What is your priority?",
        answers: [
            { text: "Commit block every time", correct: false },
            { text: "Read and react to the hitter", correct: true },
            { text: "Stay on the right side only", correct: false },
            { text: "Play defense deep court", correct: false }
        ]
    }
];

let currentQuestionIndex = 0;

const situationEl = document.getElementById("situation");
const answersEl = document.getElementById("answers");
const feedbackEl = document.getElementById("feedback");
const nextBtn = document.getElementById("nextBtn");
const progressEl = document.getElementById("progress");

function loadQuestion() {
    const current = situations[currentQuestionIndex];
    situationEl.innerText = current.question;
    answersEl.innerHTML = "";
    feedbackEl.innerText = "";
    nextBtn.style.display = "none";
    progressEl.innerText = `Situation ${currentQuestionIndex + 1} of ${situations.length}`;

    current.answers.forEach(answer => {
        const button = document.createElement("button");
        button.innerText = answer.text;
        button.classList.add("btn");
        button.onclick = () => selectAnswer(button, answer.correct);
        answersEl.appendChild(button);
    });
}

function selectAnswer(button, correct) {
    if (correct) {
        button.classList.add("correct");
        feedbackEl.innerText = "✅ Correct! Good decision.";
        nextBtn.style.display = "block";
    } else {
        button.classList.add("wrong");
        feedbackEl.innerText = "❌ Incorrect. Try again.";
    }
}

nextBtn.onclick = () => {
    currentQuestionIndex++;
    if (currentQuestionIndex < situations.length) {
        loadQuestion();
    } else {
        situationEl.innerText = "🎉 Training Complete! Great job!";
        answersEl.innerHTML = "";
        feedbackEl.innerText = "";
        nextBtn.style.display = "none";
    }
};

loadQuestion();
</script>

</body>
</html>
